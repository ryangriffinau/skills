name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skills:
    name: Skills
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint skill metadata
        run: scripts/lint-skills

      - name: Enforce skill version bumps
        if: github.event_name == 'pull_request'
        run: scripts/lint-skills --check-version-bumps --base-ref "origin/${{ github.base_ref }}"

      - name: Bash syntax check skill scripts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            first_line="$(head -n 1 "$file")"
            if [[ "$file" == *.sh || "$first_line" == *"bash"* || "$first_line" == *"/sh"* ]]; then
              bash -n "$file"
            fi
          done < <(find skills -path '*/scripts/*' -type f | sort)

      - name: Run skill tests
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r test_file; do
            bash "$test_file"
          done < <(find skills -path '*/tests/*.test.sh' -type f | sort)

      - name: ShellCheck skill shell scripts
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck unavailable; skipping advisory shell lint"
            exit 0
          fi
          files=()
          while IFS= read -r file; do
            first_line="$(head -n 1 "$file")"
            if [[ "$file" == *.sh || "$first_line" == *"bash"* || "$first_line" == *"/sh"* ]]; then
              files+=("$file")
            fi
          done < <(find skills -path '*/scripts/*' -type f | sort)
          if [ "${#files[@]}" -gt 0 ]; then
            shellcheck "${files[@]}"
          fi
